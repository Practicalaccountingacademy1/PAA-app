<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAA / PLA — Course Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --navy:#232a5c; --navy-light:#2e356c; --teal:#3ea99e; --teal-dark:#2f8a80; --teal-tint:#e6f5f3;
    --bg:#f6f7fb; --card:#ffffff; --ink:#1c2033; --muted:#6b7280; --line:#e6e8f0;
    --full-bright:#e4002b; --discount-bright:#dd9c00; --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Poppins',sans-serif; letter-spacing:-0.01em;}
  button{font-family:inherit; cursor:pointer;}
  .hidden{display:none !important;}
  a{color:inherit;}

  header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%); color:#fff; padding:12px 22px; position:sticky; top:0; z-index:60; box-shadow:0 2px 12px rgba(35,42,92,0.25);}
  .header-row{display:flex; align-items:center; justify-content:space-between; max-width:1160px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:12px; cursor:pointer;}
  .brand-mark{height:40px; width:auto; display:block;}
  .brand-mark-fallback{width:40px;height:40px;border-radius:10px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Poppins';color:var(--navy);font-size:14px;flex-shrink:0;}
  .brand-text .name{font-weight:700; font-size:14px; line-height:1.15;}
  .brand-text .sub{font-size:10px; color:#c7ccec; letter-spacing:.04em;}
  .hamburger{background:rgba(255,255,255,0.12); border:none; width:42px; height:42px; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;}
  .hamburger span{width:20px; height:2px; background:#fff; border-radius:2px;}

  .menu-overlay{position:fixed; inset:0; background:rgba(20,23,40,0.35); z-index:70;}
  .menu-panel{position:fixed; top:0; right:0; width:290px; max-width:88vw; height:100%; background:#fff; z-index:80; box-shadow:-8px 0 30px rgba(0,0,0,0.18); padding:18px; display:flex; flex-direction:column; gap:4px; animation:slideIn .18s ease-out;}
  @keyframes slideIn{from{transform:translateX(100%);} to{transform:translateX(0);}}
  .menu-close{align-self:flex-end; background:none; border:none; font-size:20px; color:var(--muted); margin-bottom:6px;}
  .menu-orgrow{display:flex; background:var(--bg); border-radius:999px; padding:4px; gap:4px; margin-bottom:14px;}
  .menu-orgrow button{flex:1; border:none; background:transparent; padding:9px; border-radius:999px; font-weight:700; font-size:13px; color:var(--muted);}
  .menu-orgrow button.active{background:var(--navy); color:#fff;}
  .menu-item{display:flex; align-items:center; gap:10px; padding:12px 10px; border-radius:9px; border:none; background:none; text-align:left; font-size:14px; font-weight:600; color:var(--ink);}
  .menu-item:hover{background:var(--bg);}
  .menu-item .ico{width:20px; text-align:center;}
  .menu-divider{border-top:1px solid var(--line); margin:10px 0;}
  .menu-foot{margin-top:auto; font-size:11px; color:var(--muted); text-align:center;}
  .menu-admin-link{font-size:12px; color:var(--muted); text-align:center; padding:10px; text-decoration:underline; background:none; border:none;}

  main{max-width:1160px; margin:0 auto; padding:24px;}

  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin:26px 0 14px;}
  .section-head h2{font-size:20px; margin:0;}
  .section-head .count{font-size:13px; color:var(--muted);}

  .pillrow{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;}
  .pill{border:1px solid var(--line); background:#fff; padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600; color:var(--muted);}
  .pill.active{background:var(--navy); color:#fff; border-color:var(--navy);}

  .gallery{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px;}
  .gallery img{width:130px; height:95px; object-fit:cover; border-radius:10px; flex-shrink:0;}
  .gallery-outer{overflow:hidden; width:100%; -webkit-mask-image:linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent); mask-image:linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent);}
  .gallery-track{display:flex; gap:16px; width:max-content; animation:galleryScroll 35s linear infinite;}
  .gallery-track:hover{animation-play-state:paused;}
  .gallery-track img{height:190px; width:auto; max-width:280px; object-fit:contain; background:#fff; border:1px solid var(--line); border-radius:12px; padding:4px; flex-shrink:0; box-shadow:0 2px 8px rgba(35,42,92,0.08);}
  @keyframes galleryScroll{from{transform:translateX(0);} to{transform:translateX(-50%);}}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; display:flex; flex-direction:column; gap:8px; transition:.15s; position:relative;}
  .card:hover{box-shadow:0 6px 20px rgba(35,42,92,0.10); transform:translateY(-2px);}
  .card .cat-row{display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap;}
  .card .cat{font-size:11px; font-weight:700; color:var(--teal-dark); text-transform:uppercase; letter-spacing:.05em;}
  .level-tag{font-size:10px; font-weight:700; color:var(--navy); background:#eef1fb; padding:2px 8px; border-radius:6px;}
  .tag-discount{font-size:10px; font-weight:800; color:#fff; background:var(--discount-bright); padding:3px 9px; border-radius:6px; letter-spacing:.02em;}
  .discount-banner{background:linear-gradient(135deg, #ff3b3b 0%, var(--full-bright) 100%); color:#fff; font-family:'Poppins'; font-weight:900; font-size:22px; text-align:center; letter-spacing:.05em; padding:14px; border-radius:10px 10px 0 0; margin:-18px -18px 10px -18px; box-shadow:0 3px 10px rgba(228,0,43,0.35); text-shadow:0 1px 3px rgba(0,0,0,0.35); -webkit-text-stroke:0.5px rgba(255,255,255,0.4); position:relative; z-index:1;}
  .recommended-banner{background:var(--navy); color:#fff; font-weight:800; font-size:13px; text-align:center; padding:6px; border-radius:8px; margin-bottom:4px;}
  .share-btn{position:absolute; top:14px; right:14px; background:#fff; border:1px solid var(--line); border-radius:999px; width:32px; height:32px; font-size:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,0.08); z-index:2;}
  .price-discounted{font-size:28px; font-weight:800; color:var(--full-bright); font-family:'Poppins'; margin-left:8px;}
  .price-old{font-size:14px; color:var(--muted); text-decoration:line-through; margin-right:4px;}
  .rec-highlight{background:var(--teal-tint); border:2px solid var(--teal); border-radius:var(--radius); padding:18px; margin-bottom:20px;}
  .rec-highlight-title{font-family:'Poppins'; font-weight:800; font-size:18px; color:var(--navy); margin-bottom:12px;}
  .rec-card-highlight{border:2px solid var(--navy);}
  .card h3{font-size:17px; margin:0; color:var(--navy);}
  .card .desc{font-size:13px; color:var(--muted); line-height:1.4;}
  .card .audience{font-size:12.5px; font-weight:700; color:var(--navy);}
  .card .benefits{font-size:12.5px; font-weight:700; color:var(--navy);}
  .row{display:flex; justify-content:space-between; align-items:center; font-size:13px;}
  .price{font-weight:800; font-size:18px; color:var(--navy); font-family:'Poppins';}
  .price-note{font-size:13.5px; font-weight:700; color:var(--navy);}
  .discount-expiry{font-size:13px; font-weight:800; color:var(--full-bright);}
  .seats-remaining{font-size:13px; font-weight:700; color:var(--full-bright);}
  .btn-pay{background:#16a34a; color:#fff;}
  .btn-pay:hover{background:#128a3c;}
  .private-box{border:1px dashed var(--teal); border-radius:10px; padding:12px; margin:10px 0; font-size:13px; background:var(--teal-tint);}
  .phone-row{display:flex; gap:8px;}
  .phone-row select{flex:0 0 100px;}
  .lang-toggle{background:rgba(255,255,255,0.12); border:none; color:#fff; padding:8px 12px; border-radius:10px; font-weight:700; font-size:12px; margin-right:8px;}
  .paa-brand-badge{background:var(--teal); color:#fff; font-family:'Poppins'; font-weight:800; font-size:16px; letter-spacing:.03em; padding:6px 14px; border-radius:8px; margin-right:12px;}
  .quicknav{background:#fff; border-bottom:1px solid var(--line); position:sticky; top:64px; z-index:55; display:flex; justify-content:center; gap:6px; padding:8px 12px; flex-wrap:wrap;}
  .quicknav button{background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:13px; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:6px;}
  .quicknav button:hover{background:var(--teal-tint); border-color:var(--teal);}
  .qn-ico{font-size:14px;}
  .status-awaiting_schedule{background:#eef1fb;color:var(--navy);}
  .badge{padding:3px 9px; border-radius:6px; font-size:11px; font-weight:700;}
  .badge.mode-physical{background:#eef1fb; color:var(--navy);}
  .badge.mode-online{background:var(--teal-tint); color:var(--teal-dark);}
  .badge.registered-out{background:var(--full-bright); color:#fff;}
  .badge.tbd{background:#eef1fb; color:var(--muted);}
  .sessions-mini{font-size:12px; color:var(--muted);}
  .btn{border:none; border-radius:9px; padding:10px 14px; font-weight:700; font-size:13px;}
  .btn-primary{background:var(--teal); color:#fff;}
  .btn-primary:hover{background:var(--teal-dark);}
  .btn-outline{background:#fff; border:1px solid var(--navy); color:var(--navy);}
  .btn-full{width:100%;}
  .btn:disabled{background:var(--line); color:var(--muted); cursor:not-allowed;}
  .btn-whatsapp{background:#25D366; color:#fff;}

  .overlay{position:fixed; inset:0; background:rgba(28,32,51,0.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal{background:#fff; border-radius:var(--radius); max-width:520px; width:100%; max-height:88vh; overflow-y:auto; padding:26px; position:relative;}
  .modal h2{margin-top:0; font-size:19px;}
  .modal label{font-size:13px; font-weight:600; display:block; margin:14px 0 6px;}
  .modal input, .modal select, .modal textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit;}
  .modal .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .modal .close-x{position:absolute; top:16px; right:20px; background:none; border:none; font-size:20px; color:var(--muted);}
  .steps{display:flex; gap:6px; margin-bottom:16px;}
  .steps .dot{flex:1; height:4px; background:var(--line); border-radius:2px;}
  .steps .dot.done{background:var(--teal);}
  .session-card{border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer;}
  .session-card.selected{border-color:var(--teal); background:var(--teal-tint);}
  .session-card.disabled{opacity:.5; cursor:not-allowed;}
  .session-line{font-weight:700; font-size:13.5px; margin:2px 0;}
  .pay-box{background:var(--teal-tint); border-radius:10px; padding:14px; font-size:13px; margin-top:6px; line-height:1.5;}
  .filerow{border:1px dashed var(--line); border-radius:9px; padding:12px; text-align:center; font-size:13px; color:var(--muted); margin-top:8px;}
  .credential-box{background:var(--navy); color:#fff; border-radius:10px; padding:14px; margin-top:10px; font-size:14px;}
  .credential-box b{font-size:16px;}

  .bubble{background:var(--teal-tint); border-radius:16px 16px 16px 4px; padding:14px 16px; margin-bottom:12px; font-size:13px; line-height:1.5;}
  .resource-item{border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px;}
  .resource-title{font-weight:700; font-size:14px; color:var(--navy);}
  .bubble .btitle{font-weight:800; font-size:14px; margin-bottom:4px; color:var(--navy);}
  .bubble .bprice{font-size:12px; color:var(--teal-dark); font-weight:700; margin-top:6px;}

  .dash-grid{display:grid; grid-template-columns:1.3fr 1fr; gap:20px;}
  @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}}
  .panel{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
  .panel h3{margin:0 0 12px; font-size:15px;}
  .today-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px; gap:8px;}
  .today-item:last-child{border-bottom:none;}
  .status-tag{padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; white-space:nowrap;}
  .status-payment_due{background:#fbe7ea;color:var(--full-bright);}
  .status-pending_approval{background:#fff3dd;color:#a06b00;}
  .status-approved{background:var(--teal-tint);color:var(--teal-dark);}
  .status-returned{background:#fde2c8;color:#a0521a;}
  .status-refunded{background:#e9eafc;color:var(--navy);}

  .admin-tabs{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .admin-tabs button{background:#fff; border:1px solid var(--line); padding:9px 16px; border-radius:9px; font-weight:600; font-size:13px; position:relative;}
  .admin-tabs button.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .notif-badge{background:var(--full-bright); color:#fff; font-size:10px; border-radius:999px; padding:1px 6px; margin-left:6px;}
  table{width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); overflow:hidden;}
  th,td{padding:10px 12px; text-align:left; font-size:13px; border-bottom:1px solid var(--line);}
  th{background:#f1f2f8; font-weight:700; color:var(--navy);}
  tr:last-child td{border-bottom:none;}
  .icon-btn{background:none; border:1px solid var(--line); border-radius:7px; padding:5px 9px; font-size:12px; margin-right:4px; margin-bottom:2px;}
  .icon-btn.danger{color:var(--full-bright); border-color:#f2c6cc;}
  .icon-btn.good{color:var(--teal-dark); border-color:var(--teal);}
  .icon-btn.wa{color:#128C3E; border-color:#25D366;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .checkline{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .empty{color:var(--muted); font-size:13px; padding:20px; text-align:center;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.2); max-width:90vw;}
  .small-muted{font-size:12px;color:var(--muted);}
  .stat-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;}
  .stat-box{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 18px; flex:1; min-width:140px;}
  .stat-box .n{font-size:22px; font-weight:800; font-family:'Poppins'; color:var(--navy);}
  .stat-box .l{font-size:12px; color:var(--muted);}
  .session-row-form{border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; position:relative;}
  .session-row-form .rm{position:absolute; top:8px; right:8px; background:none; border:none; color:var(--full-bright); font-size:13px;}
  .footer-social{margin-top:36px; padding-top:20px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;}
  .footer-social a{text-decoration:none; font-weight:600; color:var(--navy);}
  .settings-block{margin-bottom:22px;}
  .inline-input{border:1px solid var(--line); border-radius:6px; padding:5px 7px; font-size:12.5px; width:100%;}
  .history-group{margin-bottom:16px;}
  .history-group h4{margin:0 0 8px; font-size:13px; color:var(--navy);}
  #importBanner{background:#fff3dd;border:1px solid #f0d99a;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#7a5300;margin-bottom:14px;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand" onclick="goHome()">
      <span id="brandMarkWrap"></span>
      <div class="brand-text">
        <div class="name" id="brandName">Practical Accounting Academy</div>
      </div>
    </div>
    <div style="display:flex; align-items:center;">
      <div class="paa-brand-badge">PAA</div>
      <button class="lang-toggle" onclick="toggleLang()" id="langToggleBtn">عربي</button>
      <button class="hamburger" onclick="toggleMenu(true)"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<nav class="quicknav">
  <button onclick="goHome()"><span class="qn-ico">🏠</span> <span id="qnHome">Home</span></button>
  <button onclick="openStudentLogin()"><span class="qn-ico">🔑</span> <span id="qnLogin">PAA Login</span></button>
  <button onclick="goDashboard()"><span class="qn-ico">🎓</span> <span id="qnDashboard">My Dashboard</span></button>
  <button onclick="goHiring()"><span class="qn-ico">💼</span> <span id="qnHiring">Hiring</span></button>
  <button onclick="openContactUs()"><span class="qn-ico">☎️</span> <span id="qnContact">Contact Us</span></button>
</nav>

<div id="menuRoot"></div>

<main>

  <section id="view-browse">
    <div id="galleryWrap"></div>

    <div class="section-head">
      <h2 id="catalogTitle">Course Offering</h2>
      <span class="count" id="catalogCount"></span>
    </div>
    <div class="pillrow" id="categoryPills"></div>
    <div class="grid" id="courseGrid" style="margin-top:14px;"></div>

    <div class="footer-social" id="footerSocial"></div>
  </section>

  <section id="view-hiring" class="hidden">
    <div class="section-head"><h2 id="hiringTitle">Hiring!</h2></div>
    <div id="hiringContent"></div>
  </section>

  <section id="view-dashboard" class="hidden">
    <div class="section-head"><h2 id="dashGreeting">My Dashboard</h2></div>
    <div id="dashboardContent"></div>
  </section>

  <section id="view-admin" class="hidden">
    <div class="section-head">
      <h2>Admin — <span id="adminOrgLabel">PAA</span></h2>
      <div class="menu-orgrow" style="width:180px;">
        <button onclick="setOrg('PAA')" id="adminOrgBtnPAA">PAA</button>
        <button onclick="setOrg('PLA')" id="adminOrgBtnPLA">PLA</button>
      </div>
    </div>
    <p class="small-muted" style="margin-top:-10px; margin-bottom:14px;">Manage each academy's courses separately here. Students see everything together in one catalog.</p>
    <div class="stat-row" id="adminStats"></div>
    <div class="admin-tabs">
      <button data-atab="courses" class="active">Courses</button>
      <button data-atab="students">Registrations <span class="notif-badge hidden" id="pendingBadge"></span></button>
      <button data-atab="database">Student Database</button>
      <button data-atab="recs">Recommendations</button>
      <button data-atab="history">History Log</button>
      <button data-atab="hiring">Hiring <span class="notif-badge hidden" id="appsBadge"></span></button>
      <button data-atab="resources">Class Resources</button>
      <button data-atab="settings">Settings</button>
    </div>
    <div id="admin-courses"></div>
    <div id="admin-students" class="hidden"></div>
    <div id="admin-database" class="hidden"></div>
    <div id="admin-recs" class="hidden"></div>
    <div id="admin-history" class="hidden"></div>
    <div id="admin-hiring" class="hidden"></div>
    <div id="admin-resources" class="hidden"></div>
    <div id="admin-settings" class="hidden"></div>
  </section>

</main>

<div id="modalRoot"></div>

function describeError(e){
  if(!e) return 'Unknown error';
  const parts = [];
  if(e.message) parts.push(e.message);
  if(e.code) parts.push('code: '+e.code);
  if(e.details) parts.push('details: '+e.details);
  if(e.hint) parts.push('hint: '+e.hint);
  return parts.length ? parts.join(' | ') : JSON.stringify(e);
}
function camelToDb(obj, map){
  const out = {};
  Object.keys(obj).forEach(k=>{ out[map[k] || k] = obj[k]; });
  return out;
}
function dbToCamel(row, map){
  const reverse = {};
  Object.keys(map).forEach(k=> reverse[map[k]] = k);
  const out = {};
  Object.keys(row).forEach(k=>{ out[reverse[k] || k] = row[k]; });
  return out;
}
async function sbLoadTable(table, map, fallback){
  try{
    const { data, error } = await sb.from(table).select('*');
    if(error) throw error;
    if(!data || data.length===0){
      if(fallback && fallback.length){
        await sb.from(table).upsert(fallback.map(o=>camelToDb(o, map)));
      }
      return fallback;
    }
    return data.map(row=>dbToCamel(row, map));
  }catch(e){ console.error('Supabase load failed: '+table+' — '+describeError(e)); return fallback; }
}
async function sbSaveTable(table, map, arr){
  try{
    if(!arr || !arr.length) return;
    const { error } = await sb.from(table).upsert(arr.map(o=>camelToDb(o, map)));
    if(error) console.error('Supabase save failed: '+table+' — '+describeError(error));
  }catch(e){ console.error('Supabase save failed: '+table+' — '+describeError(e)); }
}
async function sbDeleteById(table, id){
  try{ await sb.from(table).delete().eq('id', id); }
  catch(e){ console.error('Supabase delete failed: '+table+' — '+describeError(e)); }
}
async function sbDeleteWhere(table, column, value){
  try{ await sb.from(table).delete().eq(column, value); }
  catch(e){ console.error('Supabase delete failed: '+table+' — '+describeError(e)); }
}
async function sbLoadSettings(){
  try{

    return {...STATE.settings, ...mapped};

}

function fuzzyKey(str){
  return (str||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' ');
}
async function migrateDuplicateCourses(){
  const CANONICAL = ['Accounting & Finance Levels', 'Accounting & Finance Workshops'];
  const CANONICAL_KEYS = {}; CANONICAL.forEach(c=> CANONICAL_KEYS[fuzzyKey(c)] = c);
  let changed = false;

  // First, normalize any near-duplicate spelling/casing/spacing of the two canonical categories.
  STATE.courses.forEach(c=>{
    const k = fuzzyKey(c.category);
    if(CANONICAL_KEYS[k] && c.category !== CANONICAL_KEYS[k]){ c.category = CANONICAL_KEYS[k]; changed = true; }
  });

  // Then merge courses that are really the same course (matched loosely, ignoring case/spacing/punctuation).
  ['PAA','PLA'].forEach(org=>{
    const groups = {};
    STATE.courses.filter(c=>c.org===org).forEach(c=>{
      const key = fuzzyKey(c.title);
      (groups[key]=groups[key]||[]).push(c);
    });
    Object.values(groups).forEach(group=>{
      if(group.length<2) return;
      changed = true;
      // Prefer the copy already under a canonical category; otherwise keep the first one.
      const primary = group.find(c=>CANONICAL.includes(c.category)) || group[0];
      const extras = group.filter(c=>c!==primary);
      // Merge any schedules from the extras into the one we keep, skipping exact duplicate session ids.
      extras.forEach(extra=>{
        (extra.sessions||[]).forEach(s=>{
          if(!primary.sessions.some(ps=>ps.id===s.id)) primary.sessions.push(s);
        });
      });
      const extraIds = new Set(extras.map(c=>c.id));
      STATE.courses = STATE.courses.filter(c=>!extraIds.has(c.id));
      extraIds.forEach(id=>sbDeleteById('courses', id));
      // Point any existing registrations for the removed duplicate(s) to the surviving course.
      STATE.registrations.forEach(r=>{ if(extraIds.has(r.courseId)) r.courseId = primary.id; });
    });
  });
  if(changed){ await saveCourses(); await saveRegs(); }
}

  let phrase = course.recPhrase || `You'd love ${course.title}! It's practical, hands on, and just $${course.price}. Ready to level up?`;
  if(course.discount && course.discountedPrice){
    const origPriceStr = '$' + course.price;

      phrase = phrase.split(origPriceStr).join(discPriceStr);
    } else if(!phrase.includes(discPriceStr)){
      phrase += ` (Now just ${discPriceStr}!)`;
    }
  }
  return phrase;
}

function totalSeatsInfo(course){
  if(!course.sessions || course.sessions.length===0) return {maxSeats:0, enrolled:0, anyOpen:false, remaining:0, noSessions:true};
  const maxSeats = course.sessions.reduce((a,s)=>a+s.maxSeats,0);
  const enrolled = course.sessions.reduce((a,s)=>a+s.enrolled,0);
  const anyOpen = course.sessions.some(s=>s.enrolled < s.maxSeats);
  return {maxSeats, enrolled, anyOpen, remaining:Math.max(0,maxSeats-enrolled), noSessions:false};
}

function fmtExpiryDate(d){ if(!d) return ''; const [y,m,day] = d.split('-'); return `${m}/${day}/${y}`; }
function shareCourse(courseId){

  const fallback = () => window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  if(navigator.share){
    navigator.share({title:c.title, text, url:link}).catch(fallback);
  } else {
    fallback();
  }
}

function handleReceiptFile(input){
  regState.receiptName = input.files[0] ? input.files[0].name : null;

async function submitContact(){
  const name=document.getElementById('regName').value.trim();
  const country=document.getElementById('regCountry').value;
  const localNumber=document.getElementById('regPhone').value.trim();
  if(!name||!localNumber){ showToast(t('Name and phone are required')); return; }
  const phone = combinePhone(country, localNumber);
  const course = STATE.courses.find(c=>c.id===regState.courseId);
  const courseOrg = course ? course.org : 'PAA';
  let student = STATE.students.find(s=>s.phone===phone);
  let isNew = false;
  if(!student){
    const orgCount = STATE.students.filter(s=>s.org===courseOrg).length;
    const prefix = courseOrg==='PAA' ? 1001 : 2001;
    student = {id:uid(), studentId:`${courseOrg}-${prefix+orgCount}`, password:genPassword(), name, phone, org:courseOrg, major:'', level:'', nationalId:'', address:'', experience:'', education:'', email:'', createdAt:Date.now()};
    STATE.students.push(student);
    isNew = true;
  } else { student.name=name; }
  await saveStudents();

  const chargedPrice = (course.discount && course.discountedPrice) ? course.discountedPrice : course.price;

  // If a registration stub already exists (student hit Back from a later step), reuse it instead of creating a duplicate.
  let reg = regState.regId ? STATE.registrations.find(x=>x.id===regState.regId) : null;
  if(!reg){
    reg = {
      id:uid(), studentId:student.id, courseId:regState.courseId, sessionId:null,
      paymentMethod:'', receiptName:null, status:'awaiting_schedule',
      price:chargedPrice, regDate:new Date().toISOString().slice(0,10), paymentDate:'', ts:Date.now()
    };
    STATE.registrations.push(reg);
  } else {
    reg.studentId = student.id;
  }
  await saveRegs();

  regState.studentId = student.id;
  regState.regId = reg.id;
  regState.isNewStudent = isNew;
  regState.step = 2;
  renderRegisterModal();
}
async function chooseSession(){
  const r = STATE.registrations.find(x=>x.id===regState.regId);
  r.sessionId = regState.sessionId;
  r.status = 'payment_due';
  await saveRegs(); await saveCourses();
  regState.step = 3;
  renderRegisterModal();
}
async function submitPayment(){
  const course = STATE.courses.find(c=>c.id===regState.courseId);
  const paymentMethod = document.getElementById('payMethod').value;
  const r = STATE.registrations.find(x=>x.id===regState.regId);

async function submitReupload(){
  if(!reuploadName){ showToast(t('Select a file first')); return; }
  const r = STATE.registrations.find(x=>x.id===reuploadRegId);
  r.receiptName = reuploadName; r.status = 'pending_approval';
  r.paymentMethod = document.getElementById('reuploadMethod').value;
  r.paymentDate = new Date().toISOString().slice(0,10);
  await saveRegs();
  closeModal(); renderDashboard();
  showToast(t('Receipt submitted — status: Pending Approval'));
}

function courseTimingStatus(session){
  if(!session || !session.start || !session.end) return t('Registered — No Schedule Yet');
  const today = new Date().toISOString().slice(0,10);
  if(today < session.start) return 'Not started yet';
  if(today > session.end) return 'Completed';
  return 'Ongoing';
}
function courseTimingClass(session){
  const s = courseTimingStatus(session);
  return {'Not started yet':'status-refunded', 'Ongoing':'status-approved', 'Completed':'status-refunded'}[s] || 'status-awaiting_schedule';
}
function renderRecordingPlayer(url){
  const safeUrl = esc(url);
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  const vimeo = url.match(/vimeo\.com\/(\d+)/);
  if(yt){
    return `<iframe width="100%" height="220" style="border-radius:10px; border:none;" src="https://www.youtube.com/embed/${yt[1]}?modestbranding=1&rel=0" allowfullscreen></iframe>`;
  }
  if(vimeo){
    return `<iframe width="100%" height="220" style="border-radius:10px; border:none;" src="https://player.vimeo.com/video/${vimeo[1]}" allowfullscreen></iframe>`;
  }
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return `<video controls controlsList="nodownload noremoteplayback" disablePictureInPicture oncontextmenu="return false" style="width:100%; border-radius:10px; background:#000;"><source src="${safeUrl}"></video>`;
  }
  // Zoom cloud recordings and other hosted links: open in a new tab where the host's own player applies.
  return `<a href="${safeUrl}" target="_blank" class="btn btn-outline">Watch recording</a><div class="small-muted" style="margin-top:4px;">Opens on the host's own protected player.</div>`;
}

function handleCourseUpload(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      const norm = k => String(k).toLowerCase().replace(/[^a-z]/g,'');
      let added = 0, skipped = 0;
      rows.forEach(r=>{
        const obj = {};
        Object.keys(r).forEach(k=> obj[norm(k)] = r[k]);
        const title = (findKey(obj,['coursename','title','course']) || '').toString().trim();
        if(!title) return;
        const dupe = STATE.courses.find(c=>c.org===STATE.org && fuzzyKey(c.title)===fuzzyKey(title));
        if(dupe){ skipped++; return; }
        const category = (findKey(obj,['major','category']) || '').toString().trim();
        const level = (findKey(obj,['level']) || '').toString().trim();
        const price = Number(findKey(obj,['standardfee','price','fee'])) || 0;
        const priceGroup = Number(findKey(obj,['groupofferpertrainee','groupfee','groupprice'])) || 0;
        const priceCorporate = Number(findKey(obj,['corporatetrainingfees','corporatefee','corporateprice'])) || 0;
        const desc = (findKey(obj,['description','desc']) || `Practical, hands-on training for ${category||title}.`).toString().trim();
        const audience = (findKey(obj,['audience','wholtsfor']) || '').toString().trim();
        const benefits = (findKey(obj,['benefits','whatyougain']) || '').toString().trim();
        const discountedPrice = Number(findKey(obj,['discountedprice','discountprice','saleprice'])) || 0;
        let discountExpiry = (findKey(obj,['discountvaliduntil','discountexpiry','discountuntil','validuntil']) || '').toString().trim();
        if(discountExpiry){
          const d = new Date(discountExpiry);
          if(!isNaN(d)) discountExpiry = d.toISOString().slice(0,10); else discountExpiry = '';
        }
        const newCourse = {
          id:uid(), org:STATE.org, title, category, level, price, priceGroup, priceCorporate, discountedPrice,
          desc, audience, benefits, discount: discountedPrice>0, discountExpiry,
          recPhrase:`You'd love ${title}! It's practical, hands on, and just $${discountedPrice>0?discountedPrice:price}. Ready to level up?`,
          sessions:[]
        };
        STATE.courses.push(newCourse);
        added++;
      });
      if(added){ await saveCourses(); }
      renderAdmin();
      showToast(`Added ${added} course${added!==1?'s':''}${skipped?`, skipped ${skipped} already-existing`:''}`);
    }catch(err){ console.error(err); showToast('Could not read that file — please check the format'); }
  };
  reader.readAsArrayBuffer(file);
}

    category: (document.getElementById('cf_category').value==='__other__' ? document.getElementById('cf_category_other').value.trim() : document.getElementById('cf_category').value),
    level: document.getElementById('cf_level').value.trim(),
    price: Number(document.getElementById('cf_price').value)||0,

    audience: document.getElementById('cf_audience').value.trim(),

    recPhrase: document.getElementById('cf_recPhrase').value.trim(),
    discount: document.getElementById('cf_discount').checked,
    sessions: courseFormSessions
  };
  if(!data.title){ showToast('Title is required'); return; }
  if(!editing){
    const dupe = STATE.courses.find(c=>c.org===STATE.org && c.title.trim().toLowerCase()===data.title.toLowerCase());
    if(dupe){ showToast(`"${dupe.title}" already exists in ${dupe.category} — edit that one instead of adding a new one`); return; }
  }
  if(editing){ const idx = STATE.courses.findIndex(x=>x.id===id); STATE.courses[idx] = data; }
  else STATE.courses.push(data);
  await saveCourses();
  closeModal(); renderAdmin();
  if(data.discount && !data.discountedPrice){
    showToast('Saved — but "Discounted price" is still $0, so the discount won\'t show yet. Edit the course and fill it in.');
  } else {

  });

async function setRegStatus(regId, status){
  const r = STATE.registrations.find(x=>x.id===regId);
  if(!r) return;
  const wasApproved = r.status === 'approved';
  const willBeApproved = status === 'approved';
  if(wasApproved !== willBeApproved){
    const course = STATE.courses.find(c=>c.id===r.courseId);
    const session = course ? (course.sessions||[]).find(s=>s.id===r.sessionId) : null;
    if(session){
      session.enrolled = Math.max(0, session.enrolled + (willBeApproved ? 1 : -1));
      await saveCourses();
    }
  }
  r.status = status;
  await saveRegs();
  renderAdmin();
  showToast('Status updated: '+labelStatus(status));
}
async function removeRegistration(regId){
  const r = STATE.registrations.find(x=>x.id===regId);
  if(!r) return;
  if(r.status === 'approved'){
    const course = STATE.courses.find(c=>c.id===r.courseId);
    const session = course ? (course.sessions||[]).find(s=>s.id===r.sessionId) : null;
    if(session){ session.enrolled = Math.max(0, session.enrolled-1); await saveCourses(); }
  }
  STATE.registrations = STATE.registrations.filter(x=>x.id!==regId);
  await sbDeleteById('registrations', regId);
  await saveRegs();
  renderAdmin();
  showToast('Registration removed — seat freed up if it was counted');
}

async function confirmSwitchCourse(regId){
  const r = STATE.registrations.find(x=>x.id===regId);
  const oldCourse = STATE.courses.find(c=>c.id===r.courseId);
  const oldSession = oldCourse ? (oldCourse.sessions||[]).find(s=>s.id===r.sessionId) : null;
  const newCourseId = document.getElementById('switch_course').value;
  const newSessionId = document.getElementById('switch_session').value;
  const newCourse = STATE.courses.find(c=>c.id===newCourseId);
  const newSession = newCourse.sessions.find(s=>s.id===newSessionId);
  if(r.status === 'approved'){
    if(oldSession) oldSession.enrolled = Math.max(0, oldSession.enrolled-1);
    newSession.enrolled += 1;
  }
  r.courseId = newCourseId; r.sessionId = newSessionId;
  r.price = (newCourse.discount && newCourse.discountedPrice) ? newCourse.discountedPrice : newCourse.price;
  await saveCourses(); await saveRegs();
  closeModal(); renderAdmin();
  showToast('Student switched to '+newCourse.title);
}

async function saveRecommendations(fromCourseIds){
  const checks = Array.from(document.querySelectorAll('.recStudentCheck:checked')).map(c=>c.value);
  const targetCourseId = document.getElementById('rec_targetCourse').value;
  const target = STATE.courses.find(c=>c.id===targetCourseId);
  if(!checks.length || !target){ showToast('Select at least one student and a target course'); return; }
  let sent = 0, skipped = 0;
  checks.forEach(studentId=>{
    if(!studentHasApprovedPayment(studentId)){ skipped++; return; }
    STATE.recommendations = STATE.recommendations.filter(r=>!(r.studentId===studentId && r.recommendedCourseId===targetCourseId));
    STATE.recommendations.push({id:uid(), studentId, recommendedCourseId:targetCourseId, fromCourseId:(fromCourseIds&&fromCourseIds[0])||null, phrase: generatePhrase(target), ts:Date.now()});
    sent++;
  });
  await saveRecs();
  showToast(`Sent to ${sent} student(s)${skipped?`, skipped ${skipped} who haven't completed payment yet`:''}`);
}

async function saveHistoryStudentEdits(studentId){
  const s = STATE.students.find(x=>x.id===studentId);
  if(!s) return;
  const phone = document.getElementById('hs_phone_'+studentId).value.trim();
  s.phone = phone;
  s.education = document.getElementById('hs_education_'+studentId).value.trim();
  s.experience = document.getElementById('hs_experience_'+studentId).value.trim();
  s.address = document.getElementById('hs_address_'+studentId).value.trim();
  // keep matching history log rows in sync with the phone number
  STATE.historyLog.forEach(h=>{ if(h.studentRef===studentId) h.phone = phone; });
  await saveStudents(); await saveHistory();
  renderAdminHistory(); renderAdminDatabase();
  showToast('Saved to Student Database');
}
function findKey(obj, substrings){
  const keys = Object.keys(obj);
  for(const sub of substrings){
    const hit = keys.find(k=>k.includes(sub));
    if(hit) return obj[hit];
  }
  return '';
}
async function findOrCreateImportedStudent(name, phone){
  name = (name||'').toString().trim();
  phone = (phone||'').toString().trim();
  if(!name) return null;
  let student = null;
  if(phone){
    student = STATE.students.find(s=>s.org===STATE.org && digitsOnly(s.phone)===digitsOnly(phone));
  } else {
    const key = name.toLowerCase().replace(/\s+/g,' ').trim();
    student = STATE.students.find(s=>s.org===STATE.org && s.name.toLowerCase().replace(/\s+/g,' ').trim()===key);
  }
  if(!student){
    const orgCount = STATE.students.filter(s=>s.org===STATE.org).length;
    const prefix = STATE.org==='PAA' ? 1001 : 2001;
    student = {id:uid(), studentId:`${STATE.org}-${prefix+orgCount}`, password:genPassword(), name, phone, org:STATE.org, major:'', level:'', nationalId:'', address:'', experience:'', education:'', email:'', source:'import', createdAt:Date.now()};
    STATE.students.push(student);
  }
  return student;
}
function handleHistoryUpload(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      const norm = k => String(k).toLowerCase().replace(/[^a-z]/g,'');
      let created = 0;
      const mapped = [];
      for(const r of rows){
        const obj = {};
        Object.keys(r).forEach(k=> obj[norm(k)] = r[k]);
        const name = findKey(obj, ['fullname','name']);
        const phone = findKey(obj, ['phone','mobile','number']);
        if(!name) continue;
        const before = STATE.students.length;
        const student = await findOrCreateImportedStudent(name, phone);
        if(!student) continue;
        if(STATE.students.length>before) created++;
        mapped.push({
          id: uid(),
          studentRef: student.id,
          studentId: student.studentId,
          name: student.name,
          phone: student.phone,
          major: findKey(obj,['major']) || student.major,
          level: findKey(obj,['level']),
          course: findKey(obj,['course']),
          grade: findKey(obj,['grade']),
          instructor: findKey(obj,['instructor','teacher']),
          startDate: findKey(obj,['startdate']),
          endDate: findKey(obj,['enddate']),
          status: findKey(obj,['status']),
          certificate: findKey(obj,['certificate']),
          date: findKey(obj,['regdate','date']) || new Date().toISOString().slice(0,10),
          source:'import'
        });
      }
      STATE.historyLog = STATE.historyLog.concat(mapped);
      await saveStudents();
      await saveHistory();
      renderAdminHistory();
      renderAdminDatabase();
      showToast(`Imported ${mapped.length} record(s), created ${created} new student account(s) with ID/password`);
    }catch(err){ console.error(err); showToast('Could not read that file — please check the format'); }
  };
  reader.readAsArrayBuffer(file);
}
function exportHistoryExcel(){
  const pwOf = studentRef => { const s = STATE.students.find(x=>x.id===studentRef); return s ? s.password : ''; };
  const rows = STATE.historyLog.map(h=>({
    'Student ID':h.studentId, 'Password':pwOf(h.studentRef), 'Name':h.name, 'Phone':h.phone, 'Major':h.major, 'Level':h.level, 'Course':h.course, 'Grade':h.grade||'', 'Date':h.date
  }));
  STATE.registrations.forEach(r=>{
    const s = STATE.students.find(x=>x.id===r.studentId); const c = STATE.courses.find(x=>x.id===r.courseId);
    if(s && c) rows.push({'Student ID':s.studentId,'Password':s.password,'Name':s.name,'Phone':s.phone,'Major':s.major||'','Level':s.level||'','Course':c.title,'Grade':r.grade||'','Date':r.regDate||new Date(r.ts).toISOString().slice(0,10)});
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'History');
  XLSX.writeFile(wb, `${STATE.org}_history_log.xlsx`);
}

    <div class="panel settings-block">
      <h3>Admin team</h3>
      <table><thead><tr><th>Name</th><th>Phone</th><th></th></tr></thead><tbody>
      ${STATE.admins.map(a=>`<tr><td>${esc(a.name)}</td><td>${esc(a.phone)}</td><td>${STATE.admins.length>1?`<button class="icon-btn danger" onclick="removeAdmin('${a.id}')">Remove</button>`:''}</td></tr>`).join('')}
      </tbody></table>
      <label style="margin-top:14px;">Add admin — name</label><input id="newAdminName" placeholder="Full name">
      <label>Phone</label><input id="newAdminPhone" placeholder="+961...">
      <label>Password</label><input id="newAdminPass" placeholder="Set a password">
      <button class="btn btn-primary" style="margin-top:10px;" onclick="addAdmin()">Add admin</button>
    </div>
  `;
}
function handlePhotoUpload(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    STATE.photos.push({id:uid(), dataUrl:reader.result, caption:'', ts:Date.now()});
    if(STATE.photos.length>12) STATE.photos = STATE.photos.slice(-12);
    await savePhotos();
    renderAdminSettings();
    showToast('Photo added');
  };
  reader.readAsDataURL(file);
}
async function deletePhoto(id){
  STATE.photos = STATE.photos.filter(p=>p.id!==id);
  await sbDeleteById('photos', id);
  await savePhotos(); renderAdminSettings();
}
async function saveSettingsForm(){
  Object.keys(STATE.settings.paymentMethods).forEach(name=>{
    const accountEl = document.getElementById('pm_account_'+name);
    const instrEl = document.getElementById('pm_instr_'+name);
    if(accountEl) STATE.settings.paymentMethods[name].account = accountEl.value.trim();
    if(instrEl) STATE.settings.paymentMethods[name].instructions = instrEl.value.trim();
  });
  const defaultEl = document.getElementById('set_defaultMethod');
  if(defaultEl) STATE.settings.defaultPaymentMethod = defaultEl.value;
  STATE.settings.whatsappNumber = document.getElementById('set_whatsapp').value.trim();
  STATE.settings.privateSessionNumber = document.getElementById('set_private').value.trim();
  await saveSettings();
  showToast('Settings saved');
}
async function addAdmin(){
  const name = document.getElementById('newAdminName').value.trim();
  const phone = document.getElementById('newAdminPhone').value.trim();
  const password = document.getElementById('newAdminPass').value;
  if(!name || !phone || !password){ showToast('Fill in all admin fields'); return; }
  STATE.admins.push({id:uid(), name, phone, password});
  await saveAdmins(); renderAdminSettings();
  showToast('Admin added');
}
async function removeAdmin(id){
  STATE.admins = STATE.admins.filter(a=>a.id!==id);
  await sbDeleteById('admins', id);
  await saveAdmins(); renderAdminSettings();
}

/* ================= INIT ================= */
function showConnectionError(msg){
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed; top:0; left:0; right:0; background:#e4002b; color:#fff; padding:14px 18px; font-size:13px; z-index:9999; text-align:center;';
  banner.innerHTML = `<strong>Database connection problem:</strong> ${esc(msg)} <button onclick="this.parentElement.remove()" style="margin-left:10px; background:#fff; color:#e4002b; border:none; border-radius:6px; padding:4px 10px; font-weight:700;">Dismiss</button>`;
  document.body.prepend(banner);
}
(async function init(){
  try{
    const { error } = await sb.from('courses').select('id').limit(1);
    if(error) showConnectionError(describeError(error));
  }catch(e){ showConnectionError(describeError(e)); }
  await loadAll();
  applyOrgTheme();
  renderBrowse();
  openSharedCourseFromUrl();
})();
</script>
</body>
</html>
